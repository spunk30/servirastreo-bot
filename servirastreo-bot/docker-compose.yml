# Stack Servirastreo Bot con WAHA (WhatsApp HTTP API)
# Reemplaza el stack anterior basado en Evolution API.
# Todos los secretos se leen desde la pestaña Environment de Easypanel
# (ver dokploy.env.example para saber que variables poner ahi).

services:

  # ---------- WAHA: API HTTP de WhatsApp ----------
  # Dashboard: http://IP_VPS:3002/dashboard
  # API docs:  http://IP_VPS:3002/
  waha:
    image: devlikeapro/waha:latest
    restart: unless-stopped
    environment:
      # Clave que protege la API. Se envia como header X-Api-Key.
      WHATSAPP_API_KEY: ${WAHA_API_KEY}

      # Engine a usar (WEBJS = WhatsApp Web via Chromium, estable en Core/free)
      WHATSAPP_DEFAULT_ENGINE: WEBJS

      # No imprimir el QR en logs (evita exponerlo por accidente)
      WAHA_PRINT_QR: "false"

      # Webhook: WAHA enviara eventos al bot por HTTP
      WHATSAPP_HOOK_URL: http://servirastreo-bot:3000/webhook?token=${WEBHOOK_TOKEN}
      WHATSAPP_HOOK_EVENTS: message

      # Credenciales del dashboard web de WAHA (Basic Auth)
      WAHA_DASHBOARD_USERNAME: ${PANEL_USER}
      WAHA_DASHBOARD_PASSWORD: ${PANEL_PASSWORD}
    volumes:
      - waha_sessions:/app/.sessions
    networks:
      - internal
      - web
    ports:
      - "3002:3000"        # WAHA accesible en http://IP_VPS:3002

  # ---------- Bot con IA y panel ON/OFF ----------
  servirastreo-bot:
    build: .
    restart: unless-stopped
    depends_on:
      - waha
    environment:
      WAHA_API_URL: http://waha:3000
      WAHA_API_KEY: ${WAHA_API_KEY}
      WAHA_SESSION: default

      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: gpt-4o-mini

      PANEL_USER: ${PANEL_USER}
      PANEL_PASSWORD: ${PANEL_PASSWORD}
      WEBHOOK_TOKEN: ${WEBHOOK_TOKEN}

      PORT: 3000
    volumes:
      - bot_data:/app/data
    networks:
      - internal
      - web
    ports:
      - "3001:3000"        # Panel bot accesible en http://IP_VPS:3001

volumes:
  waha_sessions:
  bot_data:

networks:
  internal:
  web:
